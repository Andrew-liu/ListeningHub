# Listening Hub - VOA English
# NAS 只需保留这一个文件，执行：docker compose up -d
# 然后浏览器访问 http://<主机IP>:28080

services:
  voa-english:
    image: listening-hub/voa-english:latest
    container_name: voa-english
    restart: unless-stopped
    ports:
      - "28080:28080"     # 宿主机端口 : 容器端口
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:28080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
